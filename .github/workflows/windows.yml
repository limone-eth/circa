name: Windows build

on:
  push:
    paths:
      - "windows/**"
      - ".github/workflows/windows.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained single file
        run: >
          dotnet publish windows/Circa.Win.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Zip
        run: Compress-Archive -Path publish/Circa.exe -DestinationPath Circa-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Circa-windows-x64
          path: Circa-windows-x64.zip

      - name: Attach to release on tags
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" Circa-windows-x64.zip --clobber
