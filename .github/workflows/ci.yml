name: CI

on:
  push:
    branches: [main]
    paths:
      - "windows/**"
      - "Sources/**"
      - "Info.plist"
      - "build.sh"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained single file
        run: >
          dotnet publish windows/Circa.Win.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Zip
        run: Compress-Archive -Path publish/Circa.exe -DestinationPath Circa-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Circa-windows-x64
          path: Circa-windows-x64.zip

  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Build
        run: ./build.sh
